  <!DOCTYPE html>
  <html>
      <head>
          <meta charset="UTF-8"/>
          <!-- <meta http-equiv="X-UA-Compatible" content="IE=edge"/> -->
          <meta name="viewport" content="width=device-width, initial-scale=1"/>
          <link href="/calculator/assets and styles/calculator.css" rel="stylesheet">
          <title>Co Calculator</title>
      </head>
      <body>
          <!-- CALCULATOR BOX -->
           <div class="body">
              <div class="box">
                  <!-- SCREEN BOX -->
                 <div class="screen-box">
                  <div class="theme-box">
                    <button class="light"><i>light</i></button>
                    <button class="dark"><i>dark</i></button>
                  </div>
                  <textarea class="input"></textarea>
              </div>
                  <!-- BUTTONS SECTION -->
              <div class="button-card">
                    <div class="buttons-box">
                           <div class="button-row">
                            <button class="other button clear">C</button>
                            <button class="other button">S-D</button>
                            <button class="percent other button" onclick="displayButton('percent')">%</button>
                            <button class="divide operator button" onclick="displayButton('divide')">/</button>
                        </div>
                        <div class="button-row">
                            <button class="nine numbers button" onclick="displayButton('nine')">9</button>
                            <button class="eight numbers button" onclick="displayButton('eight')">8</button>
                            <button class="seven numbers button" onclick="displayButton('seven')">7</button>
                            <button class="multiply operator button" onclick="displayButton('multiply')">x</button>
                        </div>
                        <div class="button-row">
                            <button class="six numbers button" onclick="displayButton('six')">6</button>
                            <button class="five numbers button" onclick="displayButton('five')">5</button>
                            <button class="four numbers button" onclick="displayButton('four')">4</button>
                            <button class="subtract operator button" onclick="displayButton('subtract')">-</button>
                        </div>
                        <div class="button-row">
                            <button class="three numbers button" onclick="displayButton('three')">3</button>
                            <button class="two numbers button" onclick="displayButton('two')">2</button>
                            <button class="one numbers button" onclick="displayButton('one')">1</button>
                            <button class="add operator button" onclick="displayButton('add')">+</button>
                        </div>
                        <div class="button-row">
                            <button class="double-zero numbers button" onclick="displayButton('double-zero')">00</button>
                            <button class="zero numbers button" onclick="displayButton('zero')">0</button>
                            <button class="point numbers button" onclick="displayButton('point')">.</button>
                            <button class="equal button" onclick ="calculate()">=</button>
                        </div>
                 </div>
              </div>
            </div>
           </div>
        <script src="/calculator/assets and styles/calculator.js"></script>
      </body>
  </html>
