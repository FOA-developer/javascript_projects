  <!DOCTYPE html>
  <html>
      <head>
          <meta charset="UTF-8"/>
          <!-- <meta http-equiv="X-UA-Compatible" content="IE=edge"/> -->
          <meta name="viewport" content="width=device-width, initial-scale=1"/>
          <link href="/calculator/assets and styles/calculator.css" rel="stylesheet">
          <title>Co Calculator</title>
      </head>
      <body>
          <!-- CALCULATOR BOX -->
           <div class="body">
              <div class="box">
                  <!-- SCREEN BOX -->
                 <div class="screen-box">
                  <div class="theme-box">
                    <button class="light"><i>light</i></button>
                    <button class="dark"><i>dark</i></button>
                  </div>
                  <textarea class="input"></textarea>
              </div>
                  <!-- BUTTONS SECTION -->
              <div class="button-card">
                    <div class="buttons-box">
                           <div class="button-row">
                            <button class="other clear">C</button>
                            <button class="other dec">S-D</button>
                            <button class="display other button">%</button>
                            <button class="display operator button">/</button>
                        </div>
                        <div class="button-row">
                            <button class="display numbers button ">9</button>
                            <button class="display numbers button">8</button>
                            <button class="display numbers button">7</button>
                            <button class="display operator button">x</button>
                        </div>
                        <div class="button-row">
                            <button class="display numbers button">6</button>
                            <button class="display numbers button">5</button>
                            <button class="display numbers button">4</button>
                            <button class="display operator button">-</button>
                        </div>
                        <div class="button-row">
                            <button class="display numbers button">3</button>
                            <button class="display numbers button">2</button>
                            <button class="display numbers button">1</button>
                            <button class="display operator button">+</button>
                        </div>
                        <div class="button-row">
                            <button class="display numbers button">00</button>
                            <button class="display numbers button">0</button>
                            <button class="display numbers button">.</button>
                            <button class="equal">=</button>
                        </div>
                 </div>
              </div>
            </div>
           </div>
        <script src="/calculator/assets and styles/calculator.js"></script>
      </body>
  </html>
