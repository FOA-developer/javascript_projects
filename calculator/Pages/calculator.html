<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8"/>
        <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <link href="/calculator/assets and styles/calculator.css" rel="stylesheet">
        <title>Co Calculator</title>
    </head>
    <script src="/calculator/assets and styles/calculator.js"></script>
    <body>
        <!-- CALCULATOR BOX -->
        <div class="box">
            <!-- SCREEN BOX -->
         <div class="screen-box">
             <!-- DARK AND LIGHT MODE -->
             <div class="dark-light-switch">
                <button></button>
             </div>
             <!-- SCREEN AREA -->
             <div>
                <input type="number" placeholder=".">
             </div>
         </div>
            <!-- BUTTONS SECTION -->
         <div class="button-card">
             <div class="other-icons">
                
             </div>
             <div class="buttons-box">
                <div class="button-row">
                    <button class="other-button"></button>
                    <button class="other-button"></button>
                    <button class="other-button"></button>
                    <button class="operator-button"></button>
                </div>
                <div class="button-row">
                    <button class="button"></button>
                    <button class="button"></button>
                    <button class="button"></button>
                    <button class="operator-button"></button>
                </div>
                <div class="button-row">
                    <button class="button"></button>
                    <button class="button"></button>
                    <button class="button"></button>
                    <button class="operator-button"></button>
                </div>
                <div class="button-row">
                    <button class="button"></button>
                    <button class="button"></button>
                    <button class="button"></button>
                    <button class="operator-button"></button>
                </div>
                <div class="button-row">
                    <button class="button"></button>
                    <button class="button"></button>
                    <button class="button"></button>
                    <button class="equal-button"></button>
                </div>
             </div>
         </div>
        </div>
    </body>
</html>
